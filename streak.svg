<svg xmlns="http://www.w3.org/2000/svg" width="400" height="195" viewBox="0 0 400 195">
  <rect width="400" height="195" rx="10" fill="#0a0015" stroke="#9900ff" stroke-width="1.2"/>

  <!-- top gradient bar -->
  <defs>
    <linearGradient id="gb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6600cc"/>
      <stop offset="50%" style="stop-color:#ff44ff"/>
      <stop offset="100%" style="stop-color:#6600cc"/>
    </linearGradient>
    <linearGradient id="ringgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9900ff"/>
      <stop offset="100%" style="stop-color:#ff44ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="3" rx="2" fill="url(#gb)"/>

  <!-- dividers -->
  <line x1="133" y1="30" x2="133" y2="165" stroke="#9900ff" stroke-width="0.6" opacity="0.5"/>
  <line x1="267" y1="30" x2="267" y2="165" stroke="#9900ff" stroke-width="0.6" opacity="0.5"/>

  <!-- TOTAL CONTRIBUTIONS -->
  <text x="66" y="58" font-family="monospace" font-size="11" fill="#aa55cc" text-anchor="middle">Total Contributions</text>
  <text x="66" y="105" font-family="monospace" font-size="36" fill="#ff44ff" text-anchor="middle" font-weight="bold">173</text>
  <text x="66" y="128" font-family="monospace" font-size="10" fill="#664477" text-anchor="middle">Jul 2, 2025 - Present</text>

  <!-- CURRENT STREAK (center, bigger) -->
  <!-- ring circle -->
  <circle cx="200" cy="95" r="40" fill="none" stroke="#2a0044" stroke-width="7"/>
  <circle cx="200" cy="95" r="40" fill="none" stroke="url(#ringgrad)" stroke-width="7"
    stroke-dasharray="220" stroke-dashoffset="50"
    stroke-linecap="round"
    transform="rotate(-90 200 95)"/>
  <!-- fire icon area -->
  <text x="200" y="72" font-family="monospace" font-size="13" fill="#ff44ff" text-anchor="middle">🔥</text>
  <text x="200" y="102" font-family="monospace" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text>
  <text x="200" y="148" font-family="monospace" font-size="11" fill="#ff44ff" text-anchor="middle" font-weight="bold">Current Streak</text>
  <text x="200" y="163" font-family="monospace" font-size="10" fill="#664477" text-anchor="middle">May 15 - May 16</text>

  <!-- LONGEST STREAK -->
  <text x="334" y="58" font-family="monospace" font-size="11" fill="#aa55cc" text-anchor="middle">Longest Streak</text>
  <text x="334" y="105" font-family="monospace" font-size="36" fill="#ff44ff" text-anchor="middle" font-weight="bold">5</text>
  <text x="334" y="128" font-family="monospace" font-size="10" fill="#664477" text-anchor="middle">Feb 6 - Feb 10</text>

  <!-- bottom border glow -->
  <rect x="0" y="192" width="400" height="3" rx="2" fill="url(#gb)"/>
</svg>
