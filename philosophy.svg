<svg xmlns="http://www.w3.org/2000/svg" width="600" height="160" viewBox="0 0 600 160">
  <rect width="600" height="160" rx="8" fill="#05000a" stroke="#9900ff" stroke-width="1"/>
  <rect x="0" y="0" width="600" height="3" rx="3" fill="url(#pb)"/>
  <rect x="0" y="157" width="600" height="3" rx="3" fill="url(#pb)"/>
  <defs>
    <linearGradient id="pb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9900ff"/>
      <stop offset="50%" style="stop-color:#ff44ff"/>
      <stop offset="100%" style="stop-color:#9900ff"/>
    </linearGradient>
  </defs>
  <text x="300" y="36" font-family="monospace" font-size="12" fill="#554455" text-anchor="middle">most people write code.</text>
  <text x="300" y="62" font-family="monospace" font-size="12" fill="#aa66ff" text-anchor="middle">i write intent.</text>
  <text x="300" y="80" font-family="monospace" font-size="12" fill="#aa66ff" text-anchor="middle">then the machines write the code.</text>
  <text x="300" y="108" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">i am the architect.</text>
  <text x="300" y="126" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">they are the hands.</text>
  <text x="300" y="150" font-family="monospace" font-size="11" fill="#ff44ff" text-anchor="middle" letter-spacing="8">— S A I Y A M —</text>
</svg>